{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">{{ title }}</h2>
<div class="row">
    {% for trip in trips %}
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title"><a href="{{ url_for('view_trip', trip_id=trip.id) }}">{{ trip.name }}</a></h5>
                <p class="card-text small text-muted">{{ trip.destination }} • {{ trip.start_date }} - {{ trip.end_date }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('view_trip', trip_id=trip.id) }}" class="btn btn-sm btn-primary">View</a>
                    {% if trip.user_id == current_user.id %}
                    <form action="{{ url_for('delete_trip', trip_id=trip.id) }}" method="POST" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this trip plan? This cannot be undone.');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12"><div class="alert alert-light">No trips found.</div></div>
    {% endfor %}
</div>
{% endblock %}
