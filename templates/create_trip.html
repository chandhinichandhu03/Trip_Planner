{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3>Start Planning</h3>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3"><label>Trip Name</label><input type="text" name="name" class="form-control" required></div>
                <div class="mb-3"><label>Destination (main city)</label><input type="text" name="destination" class="form-control" required></div>
                <div class="mb-3"><label>Short Description</label><textarea name="description" class="form-control" placeholder="A short tagline for this trip (optional)"></textarea></div>
                <div class="mb-3"><label>Cover Photo (optional)</label><input type="file" name="cover_photo" accept="image/*" class="form-control"></div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label>Start Date</label><input type="date" name="start_date" class="form-control" required></div>
                    <div class="col-md-6 mb-3"><label>End Date</label><input type="date" name="end_date" class="form-control" required></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label>Estimated Budget ($)</label><input type="number" step="0.01" name="estimated_budget" class="form-control" placeholder="e.g. 1500"></div>
                    <div class="col-md-6 mb-3">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" name="is_public">
                            <label class="form-check-label">Share with Community (Public)</label>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    <button class="btn btn-primary">Create Trip</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
