{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 py-5 auth-container">
    <div class="col-md-7 col-lg-5">
        <!-- Advanced Glassmorphic Register Card -->
        <div class="glass-card p-4 shadow-lg border border-light">
            <div class="text-center mb-4">
                <div class="mb-3 d-inline-flex align-items-center justify-content-center bg-primary rounded-circle shadow-sm" style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;">
                    <i class="fa-solid fa-user-plus text-white fs-2"></i>
                </div>
                <h3 class="fw-bold mb-1 heading-title">Create Account</h3>
                <p class="text-muted small">Join the GlobeTrotter AI planning ecosystem</p>
            </div>
            
            <form method="POST" class="text-start">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0 text-muted"><i class="fa-solid fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="explorer_12" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="email@domain.com" required>
                        </div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button class="btn btn-premium w-100 py-3 text-white rounded-3 shadow-sm"><i class="fa-solid fa-user-check me-2"></i>Register Account</button>
            </form>
            
            <div class="mt-4 border-top pt-3 text-center">
                <span class="small text-muted">Already registered? <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold text-teal">Sign In</a></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
