{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 py-5 auth-container">
    <div class="col-md-5 col-lg-4">
        <!-- Advanced Glassmorphic Login Card -->
        <div class="glass-card text-center p-4 shadow-lg border border-light">
            <div class="mb-4 d-inline-flex align-items-center justify-content-center bg-primary rounded-circle shadow-sm" style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;">
                <i class="fa-solid fa-earth-americas text-white fs-1"></i>
            </div>
            
            <h3 class="fw-bold mb-1 heading-title">GlobeTrotter</h3>
            <p class="text-muted small mb-4">Discover the world with AI-powered planning</p>
            
            <form method="POST" class="text-start">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button class="btn btn-premium w-100 py-3 text-white rounded-3 shadow-sm"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
            </form>
            
            <div class="mt-4 border-top pt-3 text-center">
                <span class="small text-muted">New explorer? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold text-teal">Create Account</a></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
